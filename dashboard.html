<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" 
type="text/css" />

 <!-- Style -->
 <link rel="stylesheet" href="./style/styles.css">

<!--google font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome icon-->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
   <header class="bg-slate-100 shadow-lg">
    <section class="pt-3 pb-4 pr-16 pl-16 flex justify-between ">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="" class="w-12">
            <a class="text-2xl font-bold"> GitHub Issues Tracker</a>
        </div>

        <div>
            <div class="flex gap-2">
   <div class="relative w-64">
  
  <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

  <input
    type="text"
    placeholder="Search issues..."
    class="input input-bordered w-full pl-10"
  />

</div>
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn  ">
        <div>
          <button class="btn btn-primary text-[16px] font-semibold"><i class="fa-solid fa-plus items-center"></i>New Issue</button>
        </div>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content  rounded-box z-1 mt-3 w-52 p-2 ">
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a>Settings</a></li>
        <li onclick="logout()"><a>Logout</a></li>
      </ul>
    </div>
  </div>
        </div>
    </section>

   </header>

   <main class="container mx-auto">
    <section>
        <div class="p-10 text-center">
<h1 class="text-3xl font-bold">Welcome to Dashboard 🚀</h1>
<p class="mt-4">You have successfully logged in.🤞😎</p>
</div>
    </section>

    <section class="flex gap-3 bg-slate-100 rounded-xl pt-[20px] pb-[20px] pl-[15px] shadow-lg">
        <button  onclick="toggleStyle('all')" id="all" class="btn btn-primary pl-[25px] pr-[25px]" > All</button>
       <button onclick="toggleStyle('Open')" id="Open" class="btn btn-soft pl-[25px] pr-[25px]">Open</button>
       <button onclick="toggleStyle('Closed')" id="Closed" class="btn btn-soft pl-[25px] pr-[25px]">Closed</button>
    </section>

    <section class="mt-10 bg-slate-100 rounded-md shadow-lg">
      <div class="flex justify-between items-center hidden py-5 px-7" id="all-Section">
       <div class="flex items-center gap-3">
        <div>
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h1>50 Issues</h1>
          <p>Track and manage your project issues</p>
         </div>
        </div> 
        <div class="flex gap-4">
          <div class="flex gap-1">
            <img src="./assets/Open-Status.png" alt="">
            <h1>Open</h1>
          </div>
          <div class="flex gap-1">
            <img src="./assets/Closed- Status .png" alt="">
            <h1>Closed</h1>
          </div>
        </div>
      </div>
      <div class="flex justify-between items-center hidden py-5 px-7" id="open-Section">
       <div class="flex items-center gap-3">
        <div>
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h1>44 Issues</h1>
          <p>Track and manage your project issues</p>
         </div>
        </div> 
        <div class="flex gap-4">
          <div class="flex gap-1">
            <img src="./assets/Open-Status.png" alt="">
            <h1>Open</h1>
          </div>
          
        </div>
      </div>
      <div class="flex justify-between items-center hidden py-5 px-7" id="closed-Section">
       <div class="flex items-center gap-3">
        <div>
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h1>6 Issues</h1>
          <p>Track and manage your project issues</p>
         </div>
        </div> 
        <div class="flex gap-4">
         
          <div class="flex gap-1">
            <img src="./assets/Closed- Status .png" alt="">
            <h1>Closed</h1>
          </div>
        </div>
      </div>
    </section>
    <span class="bg-black"><hr></span>

    <section  class="bg-slate-100 rounded-md shadow-lg pt-[20px]" >
      <div  class="grid grid-cols-4 gap-7 mx-4" id="issues-container" >
      
      </div>

    </section>
   </main>
  <script src="./script/dashboard.js"></script>
</body>
</html>
