<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" 
type="text/css" />

 <!-- Style -->
 <link rel="stylesheet" href="./style/styles.css">

<!--google font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome icon-->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
 <header class="bg-slate-100 shadow-lg">
  <section class="px-4 md:px-10 lg:px-16 py-3 
                  flex flex-col md:flex-row md:items-center md:justify-between gap-4">

    <!-- Logo -->
    <div class="flex items-center gap-2 justify-center md:justify-start">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 md:w-12">
      <a class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</a>
    </div>

    <!-- Search + Buttons -->
    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">

      <!-- Search -->
      <div class="relative w-full sm:w-64">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="input-btn" 
               type="text"
               placeholder="Search issues..."
               class="input input-bordered w-full pl-10" />
      </div>

      <!-- Buttons side by side -->
      <div class="flex flex-row gap-3 w-full sm:w-auto">
        <!-- Search Button -->
        <button id="search-btn" 
                class="btn btn-outline btn-primary  sm: w-auto mx-auto">
          <i class="fa-solid fa-plus"></i> Search Issues
        </button>

        <!-- Dropdown -->
        <div class="dropdown dropdown-end w-full sm:w-auto">
          <div tabindex="0" role="button" class="w-full sm:w-auto">
            <button class="btn btn-outline btn-info rounded-full sm:w-auto text-[16px] font-semibold">
              <i class="fa-solid fa-turn-down"></i>
            </button>
          </div>
          <ul tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
            <li onclick="logout()"><a>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </section>
</header>

<main class="container mx-auto">

<section>
<div class="p-10 text-center">
<h1 class="text-3xl font-bold">Welcome to Dashboard 🚀</h1>
<p class="mt-4">You have successfully logged in.</p>
</div>
</section>

<section class="flex gap-3 bg-slate-100 rounded-xl p-4 shadow-lg transition-colors duration-500 ease-in-out">

<button onclick="toggleStyle('all')" id="all"
class="btn btn-primary px-6">All</button>

<button onclick="toggleStyle('Open')" id="Open"
class="btn btn-soft px-6">Open</button>

<button onclick="toggleStyle('Closed')" id="Closed"
class="btn btn-soft px-6">Closed</button>

</section>

<section id="spinner" class="flex justify-center items-center py-10 hidden">
  <span class="loading loading-bars loading-xl"></span>
</section>

<section class="mt-10 bg-slate-100 rounded-md shadow-lg">

<!-- ALL SECTION -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 hidden py-5 px-4 md:px-7" id="all-Section">

<div class="flex items-center gap-3">
<div>
<img src="./assets/Aperture.png" alt="" class="w-8 md:w-10">
</div>

<div>
<h1 class="text-lg font-semibold">50 Issues</h1>
<p class="text-sm text-gray-600">Track and manage your project issues</p>
</div>
</div>

<div class="flex gap-4">

<div class="flex items-center gap-1">
<img src="./assets/Open-Status.png" alt="" class="w-5">
<h1 class="text-sm md:text-base">Open</h1>
</div>

<div class="flex items-center gap-1">
<img src="./assets/Closed- Status .png" alt="" class="w-5">
<h1 class="text-sm md:text-base">Closed</h1>
</div>

</div>

</div>


<!-- OPEN SECTION -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 hidden py-5 px-4 md:px-7" id="open-Section">

<div class="flex items-center gap-3">
<div>
<img src="./assets/Aperture.png" alt="" class="w-8 md:w-10">
</div>

<div>
<h1 class="text-lg font-semibold">44 Issues</h1>
<p class="text-sm text-gray-600">Track and manage your project issues</p>
</div>
</div>

<div class="flex gap-4">

<div class="flex items-center gap-1">
<img src="./assets/Open-Status.png" alt="" class="w-5">
<h1 class="text-sm md:text-base">Open</h1>
</div>

</div>

</div>


<!-- CLOSED SECTION -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 hidden py-5 px-4 md:px-7" id="closed-Section">

<div class="flex items-center gap-3">
<div>
<img src="./assets/Aperture.png" alt="" class="w-8 md:w-10">
</div>

<div>
<h1 class="text-lg font-semibold">6 Issues</h1>
<p class="text-sm text-gray-600">Track and manage your project issues</p>
</div>
</div>

<div class="flex gap-4">

<div class="flex items-center gap-1">
<img src="./assets/Closed- Status .png" alt="" class="w-5">
<h1 class="text-sm md:text-base">Closed</h1>
</div>

</div>

</div>

</section>



<section class="bg-slate-100  mb-[100px] pb-[10px] shadow-lg pt-5">

<div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 mx-4 "
id="issues-container">
</div>

</section>

</main>


<!-- ================= MODAL ================= -->

<dialog id="issueModal" class="modal">

<div class="modal-box max-w-2xl">

<h3 id="modal-title" class="text-2xl font-bold"></h3>

<div class="flex items-center gap-3 mt-3 text-sm text-gray-500">

<span id="modal-status" class="badge badge-success"></span>

<span id="modal-author"></span>

<span>•</span>

<span id="modal-date"></span>

</div>

<div id="modal-labels" class="flex gap-2 flex-wrap mt-4"></div>

<p id="modal-description" class="mt-4 text-gray-600"></p>

<div class="bg-gray-100 p-4 rounded-lg mt-6 flex justify-between">

<div>
<p class="text-sm text-gray-500">Assignee:</p>
<p id="modal-assignee" class="font-semibold"></p>
</div>

<div>
<p class="text-sm text-gray-500">Priority:</p>
<span id="modal-priority" class="badge"></span>
</div>

</div>

<div class="modal-action">
<form method="dialog">
<button class="btn btn-soft btn-secondary rounded-3xl">Close</button>
</form>
</div>

</div>

</dialog>

<script src="./script/dashboard.js"></script>

</body>
</html>
