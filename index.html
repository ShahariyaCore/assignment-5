<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"
 type="text/css" />

 <!-- Style -->
 <link rel="stylesheet" href="./style/styles.css">

<!--google font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome icon-->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="card w-96 bg-base-100 shadow-xl p-6">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center">
        
          <img src="./assets/github-logo.png" alt="">
        </div>
    </div>

    <h2 class="text-center text-2xl font-bold">GitHub Issues Tracker</h2>
    <p class="text-center text-gray-500 mb-4">Sign in to manage your issues</p>

    <!-- Username -->
    <label class="label text-[18px]">Username</label>
    <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full">

    <p class="text-sm text-blue-500 mt-1">Default: admin</p>

    <!-- Password -->
    <label class="label mt-3 text-[18px]">Password</label>
    <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full">

    <p class="text-sm text-blue-500 mt-1">Default: admin123</p>

    <!-- Button -->
    <button onclick="login()" class="btn btn-primary w-full mt-4 text-[20px] font-medium">
        Sign In
    </button>

    <!-- OR -->
    <div class="divider">OR</div>

    <!-- Demo Credentials -->
    <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
        <p><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
    </div>

</div>

<script src="./script/login.js"></script>

</body>
</html>
